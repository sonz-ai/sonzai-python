# openapi-python-client configuration for the Sonzai Python SDK.
#
# This config drives `just regenerate-sdk`, which outputs into
# src/sonzai/_generated/. The generated code lives alongside the
# hand-written public surface (src/sonzai/__init__.py, _client.py,
# resources/*.py) — the generator is a _source of types_ for the
# hand-written SDK, not a replacement for it.
#
# Rationale:
# - Hand-written resources/* preserves backwards-compatible method names,
#   kwargs, and SSE streaming behavior users depend on.
# - Generated _generated/ gives us authoritative path + operation coverage
#   plus Pydantic models we can alias into sonzai.types.

project_name_override: sonzai_generated
package_name_override: sonzai_generated

use_path_prefixes_for_title_model_names: true

# Pydantic v2 models (we already require pydantic>=2 in pyproject.toml).
# openapi-python-client 0.28 emits attrs classes by default; we keep that
# default because we only ever read the generated models at runtime by
# re-serializing into our hand-written Pydantic types where needed. The
# generator's path + operation metadata is what we mainly use downstream.

field_constraints: false

# Don't post-format — we do ruff format ourselves in the justfile recipe.
post_hooks: []
